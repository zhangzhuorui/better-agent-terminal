<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <title>Better Agent Terminal</title>
    <script>
      (function () {
        var l = (navigator.language || '').toLowerCase()
        var splash = 'Loading...'
        if (l === 'zh-tw' || l === 'zh-hk' || l === 'zh-mo') {
          document.documentElement.lang = 'zh-Hant'
          splash = '載入中...'
        } else if (l.indexOf('zh') === 0) {
          document.documentElement.lang = 'zh-Hans'
          splash = '加载中...'
        } else {
          document.documentElement.lang = 'en'
        }
        document.addEventListener('DOMContentLoaded', function () {
          var el = document.querySelector('#splash-main span')
          if (el) el.textContent = splash
        })
      })()
    </script>
    <style>
      /* Inline critical CSS for instant skeleton render */
      body { margin: 0; background: #1a1a1a; overflow: hidden; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; height: 100vh; color: #888; font-family: system-ui;
      }
      #splash-sidebar {
        width: 220px; background: #111; border-right: 1px solid #333;
        padding: 16px; box-sizing: border-box;
      }
      #splash-sidebar h2 { color: #ccc; font-size: 14px; margin: 0 0 16px; }
      #splash-main { flex: 1; display: flex; align-items: center; justify-content: center; }
      #splash-main span { font-size: 13px; opacity: 0.5; }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-sidebar">
        <h2>Better Terminal</h2>
      </div>
      <div id="splash-main"><span>Loading...</span></div>
    </div>
    <div id="root"></div>
    <script>window.__t0 = Date.now();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
